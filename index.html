<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação Especial</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
    <script>
        // SCRIPT MÁGICO: Força a quebra do iFrame se a página tentar mudar de endereço
        setInterval(function() {
            try {
                var iframe = document.getElementById('funil-iframe');
                if (iframe) {
                    var iframeUrl = iframe.contentWindow.location.href;
                    // Se o link mudar e NÃO for mais a VSL, joga para a tela cheia
                    if (iframeUrl && !iframeUrl.includes('vsl.html')) {
                        window.top.location.href = iframeUrl;
                    }
                }
            } catch (e) {
                // Se o Lovable bloquear a leitura por segurança, o erro prova que mudou de site (foi para o checkout)
                // Captura o clique global no iFrame para garantir a libertação
                console.log("Detectada tentativa de navegação externa.");
            }
        }, 200);
    </script>
</head>
<body>
    <!-- iFrame configurado com ID para o script monitorar -->
    <iframe id="funil-iframe" src="https://pvl-vitalidade-feminina.lovable.app" sandbox="allow-forms allow-modals allow-popups allow-present-to-top allow-scripts allow-top-navigation allow-top-navigation-by-user-activation allow-same-origin"></iframe>
</body>
</html>
