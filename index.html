    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { text-align: center; }
    </style>
    <script>
        (function() {
            // Analisa a assinatura de quem está acessando a página
            var ua = navigator.userAgent.toLowerCase();
            
            // Lista com todas as assinaturas conhecidas dos robôs de varredura do Meta/Facebook
            var ehRoboMeta = ua.includes("facebookexternalhit") || 
                             ua.includes("facebookplatform") || 
                             ua.includes("meta-externalagent") || 
                             ua.includes("fban") || 
                             ua.includes("fbav") ||
                             ua.includes("facebot");

            if (!ehRoboMeta) {
                // SE FOR HUMANO: Redireciona imediatamente para a VSL real no Lovable
                window.location.href = "https://pvl-vitalidade-feminina.lovable.app";
            }
            // SE FOR ROBÔ: O código não faz nada, mantendo o robô preso na página segura do GitHub abaixo
        })();
    </script>
</head>
<body>

        <p>Carregando apresentação institucional...</p>
    </div>
</body>
</html>
